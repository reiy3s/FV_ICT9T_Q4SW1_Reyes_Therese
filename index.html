<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>

<style>

    body{
        background-image: url('https://i.pinimg.com/1200x/1c/2a/ea/1c2aea1a2209724a937f12ecdeedec03.jpg');
        background-repeat: no-repeat;
        background-size: cover;
    }

    .form-control{
        width: 350px;
        margin-left: 4%;
    }

    #form-div{
        background-color: rgba(175, 171, 209, 0.9);
        width: 400px;
        margin-top: 9%;
        border-radius: 15px;
    }

</style>

<body>

    <div class="container text-center" id="form-div">
        <br><br>

        <h1>Login Form</h1>
        <p>Welcome back, buddy!</p>

        <details class="ontoggle">
            <summary>Instructions</summary>
            <p id="instructions">Please enter your credentials to log back in. <i>(username: internethacker + pw: stealYOwifi)</i></p>
        </details>

        <form>

            <div>
                <label for="user"></label>
                <input type="text" name="user" id="user" placeholder="Enter your username here..." class="form-control">
            </div>

            <div>
                <label for="pw"></label>
                <input type="password" name="pw" id="pw" placeholder="Enter your password here..." class="form-control">
            </div>

            <br>

            <div>
                <label for="checkbox">Remember me?</label>
                <input type="checkbox" name="checkbox-rmbr" id="rmbr" class="" onclick="checkbox()">
            </div>

            <i><div id="display"></div></i><br>

            <button type="button" class="btn btn-info" ondclick="GETIN()">Login</button>

        <br><br></form>
    </div>

    <script>
        function GETIN(){
            let user = document.getElementById("user").value;
            let password = document.getElementById("pw").value;
                if ((user===internethacker) && (password===stealYOwifi)){
                    alert("Welcome back, internethacker!" );
                }

                else{
                    alert("Wrong username or password. Nice try getting in, buddy!");
                }
        }

        function checkbox() {
        let remember = document.getElementById("rmbr").checked; 
        let display = document.getElementById("display");

        switch(remember) {
            case true:
                display.innerHTML = "We'll keep you in mind!"
            break;

            case false:
                display.innerHTML = ""
            break;
            }
        }
        
    </script>
    
</body>
</html>
